name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          MICROCMS_ACTIVITY_ENDPOINT: activities
          NEXT_PUBLIC_SITE_URL: https://maroinu.pages.dev
      - uses: actions/upload-artifact@v7
        with:
          name: build-out
          path: out/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-out
          path: out/
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E tests
        run: npm run test:e2e
